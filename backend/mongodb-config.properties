# MongoDB Configuration
# For local MongoDB, use: mongodb://localhost:27017
# For MongoDB Atlas, use: mongodb+srv://username:password@cluster.mongodb.net/
mongodb.connection.string=mongodb://localhost:27017
mongodb.database.name=smart_attendance

# Set to true to use MongoDB Atlas (cloud)
mongodb.use.atlas=false

# MongoDB Atlas connection string (only used if mongodb.use.atlas=true)
# Example: mongodb+srv://username:password@cluster.mongodb.net/
mongodb.atlas.connection.string=
